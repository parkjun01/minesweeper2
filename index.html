```html
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 실전 모의고사 생성기 V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; }
        
        /* A4 규격 레이아웃 */
        .exam-page {
            background-color: white;
            width: 210mm;
            min-height: 297mm;
            padding: 15mm;
            margin: 20px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            page-break-after: always;
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            position: relative;
        }

        .column-divider {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 1px;
            background-color: #cbd5e1;
            transform: translateX(-50%);
        }

        .question-item { margin-bottom: 24px; font-size: 13px; line-height: 1.6; }
        .question-num { font-weight: bold; margin-right: 5px; }
        
        /* 선택지 무조건 줄바꿈 */
        .option-item { 
            display: block; 
            margin-top: 4px; 
            padding-left: 5px; 
        }

        .header-box { border-bottom: 3px solid black; padding-bottom: 15px; margin-bottom: 25px; }
        .student-info { border: 2px solid black; padding: 8px 20px; display: inline-flex; gap: 30px; font-size: 14px; font-weight: bold; }

        .page-footer {
            position: absolute;
            bottom: 10mm;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 11px;
            color: #64748b;
        }

        /* 로딩 바 */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media print {
            body { background: none; }
            .exam-page { margin: 0; box-shadow: none; width: 210mm; height: 297mm; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <!-- 상단 설정 바 -->
    <div class="no-print bg-slate-900 text-white p-6 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-start gap-6">
            <div class="flex-1 w-full">
                <label class="block text-sm font-bold mb-2 text-slate-300">1. 학습 자료 입력 (PDF 텍스트 복사/붙여넣기)</label>
                <textarea id="sourceText" placeholder="PDF에서 복사한 내용을 여기에 붙여넣으세요. 이 내용을 바탕으로 문제가 생성됩니다." class="w-full h-24 p-3 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-200 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            <div class="w-full md:w-80 space-y-4">
                <div class="flex items-center justify-between">
                    <label class="text-sm font-bold text-slate-300">2. 문항 수 (최대 70)</label>
                    <input type="number" id="qCount" value="20" min="1" max="70" class="w-20 p-2 bg-slate-800 border border-slate-700 rounded text-center font-bold">
                </div>
                <button onclick="generateExam()" id="genBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition flex items-center justify-center gap-2">
                    <span id="btnText">AI 시험지 생성하기</span>
                    <div id="loader" class="loader hidden"></div>
                </button>
                <div class="flex gap-2">
                    <button onclick="downloadPDF()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-2.5 rounded-lg text-sm font-bold transition">PDF 저장</button>
                    <button onclick="window.print()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-2.5 rounded-lg text-sm font-bold transition">인쇄</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 시험지 렌더링 영역 -->
    <div id="exam-render-area">
        <div class="exam-page no-print flex flex-col items-center justify-center text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <p class="text-lg font-bold">자료를 입력하고 문항 수를 설정한 뒤</p>
            <p>'AI 시험지 생성하기'를 눌러주세요.</p>
        </div>
    </div>

    <script>
        const apiKey = ""; // 런타임 환경에서 제공됨

        async function generateExam() {
            const source = document.getElementById('sourceText').value.trim();
            const count = parseInt(document.getElementById('qCount').value);
            const genBtn = document.getElementById('genBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');

            if (!source) {
                alert("분석할 자료를 먼저 입력해주세요.");
                return;
            }

            if (count > 70) {
                alert("최대 70문항까지만 가능합니다.");
                return;
            }

            // UI 상태 변경
            genBtn.disabled = true;
            btnText.innerText = "AI 분석 및 문제 생성 중...";
            loader.classList.remove('hidden');

            const systemPrompt = `당신은 증권시장론 전공 교수입니다. 제공된 텍스트를 분석하여 학습 목표에 부합하는 객관식 문제를 생성하세요.
            반드시 다음 JSON 형식을 따르세요:
            {
                "questions": [
                    {
                        "question": "문제 내용",
                        "options": ["보기1", "보기2", "보기3", "보기4", "보기5"],
                        "answerIndex": 0,
                        "rationale": "정답에 대한 상세한 해설과 오답 방지 팁"
                    }
                ]
            }
            - 문항 수: ${count}개
            - 모든 문제는 5지 선다형입니다.
            - 선택지 구성은 정답이 편중되지 않도록 무작위로 배치하세요.
            - 해설(rationale)은 반드시 포함해야 하며, 학습자가 개념을 완벽히 이해할 수 있도록 상세히 작성하세요.`;

            try {
                // 지수 백오프를 적용한 API 호출 (실제 환경에서는 간단한 fetch 사용)
                const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
                    try {
                        const res = await fetch(url, options);
                        if (!res.ok) throw new Error(res.statusText);
                        return res;
                    } catch (err) {
                        if (retries <= 0) throw err;
                        await new Promise(r => setTimeout(r, backoff));
                        return fetchWithRetry(url, options, retries - 1, backoff * 2);
                    }
                };

                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: source }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);
                
                renderExamPages(result.questions);
            } catch (error) {
                console.error(error);
                alert("문제 생성에 실패했습니다. 텍스트가 너무 짧거나 서버 오류일 수 있습니다. 다시 시도해 주세요.");
            } finally {
                genBtn.disabled = false;
                btnText.innerText = "AI 시험지 생성하기";
                loader.classList.add('hidden');
            }
        }

        function renderExamPages(questions) {
            const container = document.getElementById('exam-render-area');
            container.innerHTML = "";

            const qPerPage = 20; // 20문제마다 페이지 넘김
            const totalQ = questions.length;
            const totalPages = Math.ceil(totalQ / qPerPage);

            // 문제 페이지 생성
            for (let i = 0; i < totalPages; i++) {
                const page = document.createElement('div');
                page.className = "exam-page";
                
                // 첫 페이지만 큰 헤더, 나머지는 심플 헤더
                let headerHtml = "";
                if (i === 0) {
                    headerHtml = `
                        <div class="header-box text-center">
                            <div class="text-sm font-bold text-slate-500 tracking-tighter">2026학년도 제1학기 기말고사 대비</div>
                            <div class="text-4xl font-black my-4 tracking-tight">증권시장론 실전 모의평가</div>
                            <div class="flex justify-between items-end mt-6">
                                <div class="text-xl font-bold border-b-2 border-black pb-1 px-2 ml-1">제2장 금융투자상품의 이해</div>
                                <div class="student-info mr-1">
                                    <span>성명: ________________</span>
                                    <span>번호: ________________</span>
                                </div>
                            </div>
                        </div>`;
                } else {
                    headerHtml = `
                        <div class="border-b border-slate-300 pb-2 mb-6 flex justify-between items-center">
                            <div class="text-sm font-bold">증권시장론 실전 모의평가 (계속)</div>
                            <div class="text-xs text-slate-400 font-bold">제2장 금융투자상품의 이해</div>
                        </div>`;
                }
                
                page.innerHTML = headerHtml;

                const columnContainer = document.createElement('div');
                columnContainer.className = "two-column";
                columnContainer.innerHTML = '<div class="column-divider"></div>';

                const leftCol = document.createElement('div');
                const rightCol = document.createElement('div');

                const pageQs = questions.slice(i * qPerPage, (i + 1) * qPerPage);
                const half = Math.ceil(pageQs.length / 2);

                pageQs.forEach((q, idx) => {
                    const globalIdx = (i * qPerPage) + idx + 1;
                    const qHtml = `
                        <div class="question-item">
                            <span class="question-num">${globalIdx}.</span> ${q.question}
                            <div class="options">
                                ${q.options.map((opt, oIdx) => `<div class="option-item">${String.fromCharCode(9312 + oIdx)} ${opt}</div>`).join('')}
                            </div>
                        </div>`;
                    
                    if (idx < half) leftCol.innerHTML += qHtml;
                    else rightCol.innerHTML += qHtml;
                });

                columnContainer.appendChild(leftCol);
                columnContainer.appendChild(rightCol);
                page.appendChild(columnContainer);
                page.innerHTML += `<div class="page-footer">${i + 1} / ${totalPages + 1}</div>`;
                container.appendChild(page);
            }

            // 마지막 페이지: 정답 및 해설 (단독 페이지)
            const answerPage = document.createElement('div');
            answerPage.className = "exam-page";
            answerPage.innerHTML = `
                <div class="header-box text-center">
                    <div class="text-2xl font-black my-4">정답 및 상세 해설</div>
                    <div class="text-sm text-slate-500 font-bold underline">학습 후 반드시 해설을 통해 개념을 보완하십시오.</div>
                </div>
                <div class="mt-8 space-y-5 text-[11px] leading-relaxed">
                    ${questions.map((q, idx) => `
                        <div class="border-b border-slate-100 pb-2">
                            <div class="flex items-center gap-4 mb-1">
                                <span class="bg-blue-600 text-white px-2 py-0.5 rounded font-bold">문항 ${idx + 1}</span>
                                <span class="font-black text-blue-800 text-sm">정답: ${String.fromCharCode(9312 + q.answerIndex)}</span>
                            </div>
                            <div class="text-slate-700"><span class="font-bold text-black">[해설]</span> ${q.rationale}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="page-footer">${totalPages + 1} / ${totalPages + 1}</div>
            `;
            container.appendChild(answerPage);
        }

        function downloadPDF() {
            const element = document.getElementById('exam-render-area');
            if (element.innerText.includes("자료를 입력하고")) {
                alert("먼저 시험지를 생성해주세요.");
                return;
            }

            const btn = event.currentTarget;
            btn.innerText = "PDF 파일 생성 중...";
            btn.disabled = true;

            const opt = {
                margin: 0,
                filename: '금융투자상품_이해_70문항_모의고사.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: 'css' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerText = "PDF 저장";
                btn.disabled = false;
            }).catch(err => {
                console.error(err);
                btn.innerText = "PDF 저장";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
