<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실전 대비 AI 모의고사 생성기 (Pro)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; margin: 0; }

        /* A4 규격 레이아웃 */
        .exam-page {
            background-color: white;
            width: 210mm;
            min-height: 297mm;
            padding: 15mm;
            margin: 20px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            page-break-after: always;
        }

        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            position: relative;
        }

        .column-divider {
            position: absolute;
            top: 10px;
            bottom: 10px;
            left: 50%;
            width: 1px;
            background-color: #cbd5e1;
            transform: translateX(-50%);
        }

        .header-box { border-bottom: 3px solid black; padding-bottom: 12px; margin-bottom: 20px; }
        .student-info { border: 2px solid black; padding: 5px 15px; display: inline-flex; gap: 20px; font-size: 13px; font-weight: bold; }

        .question-item { margin-bottom: 22px; font-size: 13.5px; line-height: 1.6; page-break-inside: avoid; }
        .question-num { font-weight: bold; margin-right: 5px; }
        
        /* 선택지 무조건 줄바꿈 (세로 나열) */
        .option-item { display: block; margin-top: 3px; padding-left: 5px; }

        .page-footer {
            position: absolute;
            bottom: 10mm;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 11px;
            color: #64748b;
        }

        /* 로딩 애니메이션 및 상태바 */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media print {
            body { background: none; }
            .exam-page { margin: 0; box-shadow: none; width: 210mm; height: 297mm; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <!-- 컨트롤 패널 -->
    <div class="no-print bg-slate-900 text-white p-6 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-6">
            <div class="flex-1 w-full">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-sm font-bold text-slate-300">1. 출제 근거 자료 (PDF 첨부 또는 텍스트 직접 입력)</label>
                    <div class="flex gap-2">
                        <label class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-1.5 px-3 rounded transition flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                            </svg>
                            PDF 파일 선택
                            <input type="file" id="pdfInput" accept=".pdf" class="hidden" onchange="handlePdfUpload(event)">
                        </label>
                        <button onclick="clearText()" class="text-xs text-slate-400 hover:text-white">초기화</button>
                    </div>
                </div>
                <textarea id="sourceText" placeholder="PDF를 선택하거나 내용을 직접 입력하세요. 대용량 자료의 경우 텍스트가 모두 추출된 후 '시험지 생성'을 눌러주세요." class="w-full h-32 p-3 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-200 outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                <div id="statusMsg" class="text-xs text-blue-400 mt-1 font-bold hidden">상태 메시지 표시 영역</div>
            </div>
            
            <div class="w-full md:w-80 flex flex-col justify-between">
                <div>
                    <div class="flex items-center justify-between mb-4">
                        <label class="text-sm font-bold text-slate-300">2. 문항 수 (최대 70)</label>
                        <input type="number" id="qCount" value="30" min="1" max="70" class="w-20 p-2 bg-slate-800 border border-slate-700 rounded text-center font-bold">
                    </div>
                    <button onclick="startGeneration()" id="genBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 py-3 rounded-lg font-bold transition flex items-center justify-center gap-2">
                        <span id="btnText">모의고사 시험지 생성</span>
                        <div id="loader" class="loader hidden"></div>
                    </button>
                    <!-- 진행률 표시 -->
                    <div id="progressBarContainer" class="mt-2 w-full bg-slate-700 h-1.5 rounded-full hidden">
                        <div id="progressBar" class="bg-blue-500 h-1.5 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
                <div class="flex gap-2 mt-4">
                    <button onclick="downloadPDF()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-2.5 rounded-lg text-sm font-bold transition">PDF 다운로드</button>
                    <button onclick="window.print()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-2.5 rounded-lg text-sm font-bold transition">인쇄하기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 시험지 출력 영역 -->
    <div id="exam-render-area">
        <div class="exam-page no-print flex flex-col items-center justify-center text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 mb-4 opacity-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
            <p class="text-xl font-bold">PDF 파일을 첨부하거나 자료를 입력해 주세요.</p>
            <p class="text-sm mt-2 text-center">오류 방지를 위해 10문항씩 나누어 안전하게 생성합니다.<br>최대 70문항까지 가능하며, 정답지는 마지막 장에 별도 생성됩니다.</p>
        </div>
    </div>

    <script>
        const apiKey = ""; // API Key는 환경에서 자동 제공
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const statusMsg = document.getElementById('statusMsg');
        const textarea = document.getElementById('sourceText');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const progressBar = document.getElementById('progressBar');

        function clearText() {
            textarea.value = "";
            document.getElementById('exam-render-area').innerHTML = '<div class="exam-page no-print flex flex-col items-center justify-center text-slate-400"><p class="text-xl font-bold">자료를 입력해 주세요.</p></div>';
        }

        async function handlePdfUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            statusMsg.innerText = "PDF 파일을 읽는 중...";
            statusMsg.classList.remove('hidden', 'text-red-400');
            statusMsg.classList.add('text-blue-400');
            textarea.disabled = true;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullText = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const pageText = content.items.map(item => item.str).join(' ');
                    fullText += pageText + "\n\n";
                    statusMsg.innerText = `분석 중... (${i} / ${pdf.numPages} 페이지)`;
                }
                textarea.value = fullText;
                statusMsg.innerText = "PDF 분석 완료! 내용을 확인하고 생성 버튼을 누르세요.";
            } catch (err) {
                statusMsg.innerText = "PDF 읽기 실패. 텍스트를 직접 복사해 넣어주세요.";
                statusMsg.classList.replace('text-blue-400', 'text-red-400');
            } finally {
                textarea.disabled = false;
            }
        }

        async function callGemini(prompt, source) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: `[자료]\n${source}\n\n[지시사항]\n${prompt}` }] }],
                generationConfig: { responseMimeType: "application/json" }
            };

            const retryFetch = async (retries = 5, delay = 1000) => {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(response.statusText);
                    return await response.json();
                } catch (error) {
                    if (retries > 0) {
                        await new Promise(r => setTimeout(r, delay));
                        return retryFetch(retries - 1, delay * 2);
                    }
                    throw error;
                }
            };

            return await retryFetch();
        }

        async function startGeneration() {
            const source = textarea.value.trim();
            const totalRequested = parseInt(document.getElementById('qCount').value);
            const genBtn = document.getElementById('genBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');

            if (!source) { alert("출제 근거 자료를 먼저 입력하거나 PDF를 올려주세요."); return; }
            if (totalRequested > 70) { alert("최대 70문항까지 가능합니다."); return; }

            genBtn.disabled = true;
            loader.classList.remove('hidden');
            progressBarContainer.classList.remove('hidden');
            progressBar.style.width = "0%";

            let allQuestions = [];
            const batchSize = 10;
            const totalBatches = Math.ceil(totalRequested / batchSize);

            try {
                for (let i = 0; i < totalBatches; i++) {
                    const currentBatchCount = Math.min(batchSize, totalRequested - (i * batchSize));
                    btnText.innerText = `문제 생성 중... (${i * batchSize + currentBatchCount}/${totalRequested})`;
                    
                    const batchPrompt = `당신은 대학 전공 교수입니다. 제공된 자료를 바탕으로 "새로운" 고품질 객관식(5지선다) 문제를 무작위 생성하세요. 
                    - 이전에 생성한 문제와 중복되지 않도록 하세요.
                    - 문항 수: ${currentBatchCount}개
                    - 형식: JSON (반드시 아래 구조 준수)
                    {
                        "questions": [
                            {
                                "question": "질문",
                                "options": ["① 보기1", "② 보기2", "③ 보기3", "④ 보기4", "⑤ 보기5"],
                                "answerIndex": 0,
                                "rationale": "상세한 해설"
                            }
                        ]
                    }`;

                    const data = await callGemini(batchPrompt, source);
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);
                    allQuestions = allQuestions.concat(result.questions);
                    
                    progressBar.style.width = `${((i + 1) / totalBatches) * 100}%`;
                }

                renderFinalExam(allQuestions);
                btnText.innerText = "생성 완료";
            } catch (error) {
                console.error(error);
                alert("문제 생성 중 오류가 발생했습니다. 자료 양이 너무 많으면 일부를 나누어 시도해 보세요.");
                btnText.innerText = "다시 시도";
            } finally {
                genBtn.disabled = false;
                loader.classList.add('hidden');
                setTimeout(() => {
                    progressBarContainer.classList.add('hidden');
                    btnText.innerText = "모의고사 시험지 생성";
                }, 3000);
            }
        }

        function renderFinalExam(questions) {
            const container = document.getElementById('exam-render-area');
            container.innerHTML = "";
            const qPerPage = 20; // 20문항마다 페이지 분할
            const totalPages = Math.ceil(questions.length / qPerPage);

            for (let i = 0; i < totalPages; i++) {
                const page = document.createElement('div');
                page.className = "exam-page";
                
                const headerHtml = (i === 0) ? `
                    <div class="header-box text-center">
                        <div class="text-xs font-bold text-gray-500 tracking-widest">2026학년도 제1학기 기말고사 대비</div>
                        <div class="text-4xl font-black my-4">실전 모의평가</div>
                        <div class="flex justify-between items-end mt-6">
                            <div class="text-xl font-bold border-b-2 border-black pb-1 px-1">맞춤형 문제 은행</div>
                            <div class="student-info"><span>성명: ________</span><span>번호: ________</span></div>
                        </div>
                    </div>` : `<div class="border-b-2 border-black pb-2 mb-6 font-bold text-gray-800 flex justify-between"><span>모의평가 (계속)</span><span>PAGE ${i+1}</span></div>`;

                page.innerHTML = headerHtml;

                const grid = document.createElement('div');
                grid.className = "two-column";
                grid.innerHTML = '<div class="column-divider"></div>';

                const left = document.createElement('div');
                const right = document.createElement('div');
                const currentQs = questions.slice(i * qPerPage, (i + 1) * qPerPage);
                const half = Math.ceil(currentQs.length / 2);

                currentQs.forEach((q, idx) => {
                    const qNum = (i * qPerPage) + idx + 1;
                    const qHtml = `
                        <div class="question-item">
                            <span class="question-num">${qNum}.</span> ${q.question}
                            <div class="mt-2 space-y-1">
                                ${q.options.map(opt => `<span class="option-item">${opt}</span>`).join('')}
                            </div>
                        </div>`;
                    if (idx < half) left.innerHTML += qHtml; else right.innerHTML += qHtml;
                });

                grid.appendChild(left); grid.appendChild(right);
                page.appendChild(grid);
                page.innerHTML += `<div class="page-footer">${i + 1} / ${totalPages + 1}</div>`;
                container.appendChild(page);
            }

            // 마지막 장: 정답 및 해설
            const ansPage = document.createElement('div');
            ansPage.className = "exam-page";
            ansPage.innerHTML = `
                <div class="header-box text-center">
                    <div class="text-3xl font-black my-6">정답 및 상세 해설</div>
                    <div class="text-sm text-slate-500 font-bold underline mb-4">해설을 통해 부족한 개념을 완벽하게 보완하세요.</div>
                </div>
                <div class="mt-8 space-y-5 text-[11px] leading-relaxed">
                    ${questions.map((q, idx) => `
                        <div class="border-b border-slate-100 pb-3">
                            <div class="flex items-center gap-4 mb-1">
                                <span class="bg-indigo-600 text-white px-2.5 py-0.5 rounded-full font-bold">문항 ${idx + 1}</span>
                                <span class="font-black text-indigo-900 text-sm">정답: ${q.options[q.answerIndex].split(' ')[0]}</span>
                            </div>
                            <div class="text-slate-700 pl-1"><span class="font-bold text-black">[해설]</span> ${q.rationale}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="page-footer">${totalPages + 1} / ${totalPages + 1}</div>
            `;
            container.appendChild(ansPage);
        }

        function downloadPDF() {
            const element = document.getElementById('exam-render-area');
            if (element.innerText.includes("첨부하거나 자료를")) { alert("시험지를 먼저 생성해 주세요."); return; }
            const btn = event.currentTarget;
            btn.innerText = "PDF 변환 중...";
            btn.disabled = true;

            const opt = {
                margin: 0,
                filename: 'AI_Exam_MockTest.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: 'css' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerText = "PDF 다운로드";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
